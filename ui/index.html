<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>(function(){
    var t = localStorage.getItem('theme');
    var html = document.documentElement;
    if (t === 'dark') { html.classList.add('dark'); }
    else if (t === 'light') { html.classList.add('light'); }
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) { html.classList.add('dark'); }
  })()</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./global.css">
  <style>
    @keyframes pulse-smooth {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.7; transform: scale(1.1); }
    }
    .pulse-smooth { animation: pulse-smooth 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    /* SVG is white — invert to black in light mode */
    #logo { filter: invert(1); }
    html.dark #logo { filter: invert(0); }
    @media (prefers-color-scheme: dark) {
      html:not(.light) #logo { filter: invert(0); }
    }
  </style>
</head>
<body>
  <div class="panel flex flex-col justify-center items-center">
    <img draggable="false" src="./img/symbol.svg" alt="Scrobloop" class="w-auto h-24 pulse-smooth" id="logo" />
  </div>
</body>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const { invoke } = window.__TAURI__.core;
    invoke('is_lastfm_authenticated')
      .then(authenticated => {
        setTimeout(() => {
          window.location.href = authenticated ? './scrobble.html' : './auth.html';
        }, 1000);
      })
      .catch(err => console.error(err));
  });
</script>
</html>

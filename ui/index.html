<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      user-select: none;
    }
    .panel {
      background: #1c1c1e;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 360px;
      height: 480px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <div class="panel">
    <p>Scrobloop</p>
  </div>
</body>
</html>
